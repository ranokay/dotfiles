format = """
[╭─ ](bold green)\
$username\
$directory\
$git_branch\
$git_status\
$package\
$nodejs\
$docker_context\
$battery\
$fill\
$cmd_duration\
\n[│](bold green)\
\n[╰─ ](bold green)\
"""
command_timeout = 1000

[fill]
symbol = " "

[username]
format = "[$user]($style) "
disabled = false
show_always = true

[directory]
format = "[$path]($style) "
truncation_length = 5
truncation_symbol = "…/"
use_os_path_sep = true

[git_branch]
format = '[$symbol $branch ]($style)'
symbol = ""

[git_status]
format = '[$all_status$ahead_behind]($style) '
conflicted = '🏳'
ahead = '🏎💨'
behind = '😰'
diverged = '😵'
up_to_date = '[✓](fg:#00ff00)'
untracked = '🤷'
stashed = '📦'
modified = '📝'
staged = '[++\($count\)](green)'
renamed = '👅'
deleted = '🗑'

[nodejs]
format = '[$symbol $version]($style) '
symbol = ""

[docker_context]
format = '[$symbol $context]($style) '
symbol = " "

[package]
format = '[$symbol $version]($style) '
symbol = " "

[cmd_duration]
format = '[$duration]($style) '
min_time = 10

[battery]
charging_symbol = '⚡️'
discharging_symbol = '💀 '

[[battery.display]]
threshold = 10
style = 'bold red'

[[battery.display]]
threshold = 20
style = 'bold yellow'