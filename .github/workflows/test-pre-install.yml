name: Test NixOS Pre-Install Script

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-nixos-pre-install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Set up mock environment
        run: |
          sudo apt-get update
          sudo apt-get install -y parted fdisk
          sudo truncate -s 10G testdisk.img
          sudo losetup /dev/loop0 testdisk.img
          echo '/dev/loop0' > diskfile

      - name: Run pre-install script
        run: |
          chmod +x pre-install.sh
          sudo ./pre-install.sh < <(echo -e "y\n/dev/loop0\ny\n")

      - name: Verify partitions
        run: |
          sudo fdisk -l /dev/loop0
          sudo blkid /dev/loop0p1
          sudo blkid /dev/loop0p2

      - name: Verify mounts
        run: |
          mount | grep /mnt

      - name: Check NixOS configuration
        run: |
          ls -l /mnt/etc/nixos/
          cat /mnt/etc/nixos/hardware-configuration.nix

      - name: Clean up
        if: always()
        run: |
          sudo umount /mnt/boot || true
          sudo umount /mnt || true
          sudo losetup -d /dev/loop0 || true
