name: "Test Pre-install Script"

on:
  push:
    paths:
      - "pre-install.sh"
      - ".github/workflows/test-pre-install.yml"
  pull_request:
    paths:
      - "pre-install.sh"
      - ".github/workflows/test-pre-install.yml"
  workflow_dispatch:

jobs:
  test-pre-install-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27

      - name: Create test disk image
        run: |
          dd if=/dev/zero of=testdisk.img bs=1M count=1024
          sudo losetup -fP testdisk.img
          LOOP_DEVICE=$(sudo losetup -j testdisk.img | cut -d':' -f1)
          if [ -z "$LOOP_DEVICE" ]; then
            echo "Failed to create loop device"
            exit 1
          fi
          echo "LOOP_DEVICE=$LOOP_DEVICE" >> $GITHUB_ENV

      - name: Run pre-install script
        run: |
          sudo bash pre-install.sh --disk ${{ env.LOOP_DEVICE }} --auto-confirm

      - name: Verify partitions and filesystems
        run: |
          sudo fdisk -l ${{ env.LOOP_DEVICE }}
          sudo blkid ${LOOP_DEVICE}p1
          sudo blkid ${LOOP_DEVICE}p2

          # Check if partitions are created correctly
          if ! sudo fdisk -l ${{ env.LOOP_DEVICE }} | grep -q "${LOOP_DEVICE}p1.*EFI System"; then
            echo "EFI System partition not found"
            exit 1
          fi
          if ! sudo fdisk -l ${{ env.LOOP_DEVICE }} | grep -q "${LOOP_DEVICE}p2.*Linux filesystem"; then
            echo "Linux filesystem partition not found"
            exit 1
          fi

          # Check if filesystems are created correctly
          if ! sudo blkid ${LOOP_DEVICE}p1 | grep -q "TYPE=\"vfat\""; then
            echo "FAT32 filesystem not found on EFI System partition"
            exit 1
          fi
          if ! sudo blkid ${LOOP_DEVICE}p2 | grep -q "TYPE=\"ext4\""; then
            echo "ext4 filesystem not found on Linux filesystem partition"
            exit 1
          fi

      - name: Verify mounts
        run: |
          if ! mount | grep -q "${LOOP_DEVICE}p2 on /mnt type ext4"; then
            echo "Failed to mount root partition"
            exit 1
          fi
          if ! mount | grep -q "${LOOP_DEVICE}p1 on /mnt/boot type vfat"; then
            echo "Failed to mount boot partition"
            exit 1
          fi

      - name: Clean up
        run: |
          sudo umount /mnt/boot || true
          sudo umount /mnt || true
          sudo losetup -d ${{ env.LOOP_DEVICE }} || true
        if: always()
