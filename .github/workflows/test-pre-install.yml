name: "Test Pre-Install NixOS Script"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: cachix/install-nix-action@v27

      - name: Run Pre-Install Script
        run: |
          sudo bash pre-install.sh <<EOF
          y
          /dev/loop0
          y
          EOF
