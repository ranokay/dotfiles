name: NixOS Pre-Install Test

on:
  push:
    branches:
      - main

jobs:
  test-pre-install:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        nixos-version: [unstable, 24.05]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Setup NixOS
        uses: NixOS/installer-action@v1
        with:
          nixos-version: ${{ matrix.nixos-version }}
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y bash
      - name: Run pre-install script
        run: |
          bash pre-install.sh
      - name: Check for errors
        run: |
          if [ $? -ne 0 ]; then
            echo "Pre-install script failed!"
            exit 1
          fi
