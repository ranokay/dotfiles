name: Test NixOS Pre-Install Script

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-nixos-pre-install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Set up mock environment
        run: |
          sudo apt-get update
          sudo apt-get install -y parted fdisk
          sudo truncate -s 10G testdisk.img
          LOOP_DEVICE=$(sudo losetup -f)
          sudo losetup $LOOP_DEVICE testdisk.img
          echo $LOOP_DEVICE > diskfile

      - name: Run pre-install script
        run: |
          chmod +x pre-install.sh
          DISK=$(cat diskfile)
          sudo ./pre-install.sh $DISK

      - name: Verify partitions
        run: |
          DISK=$(cat diskfile)
          sudo fdisk -l $DISK
          sudo blkid ${DISK}p1 || true
          sudo blkid ${DISK}p2 || true

      - name: Verify mounts
        run: |
          mount | grep /mnt || true

      - name: Check NixOS configuration
        run: |
          ls -l /mnt/etc/nixos/ || true
          cat /mnt/etc/nixos/hardware-configuration.nix || true

      - name: Clean up
        if: always()
        run: |
          sudo umount /mnt/boot || true
          sudo umount /mnt || true
          DISK=$(cat diskfile)
          sudo losetup -d $DISK || true
