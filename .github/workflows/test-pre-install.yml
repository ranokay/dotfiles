name: Test Pre-Install NixOS Script

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Make Script Executable
        run: |
          chmod +x pre-install.sh

      - name: Run Script
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          ./pre-install.sh

      - name: Verify Disk Partitioning
        run: |
          lsblk
          test -b /dev/nvme0n1p1
          test -b /dev/nvme0n1p2

      - name: Verify Filesystem Creation
        run: |
          blkid -s UUID -o value /dev/nvme0n1p1
          blkid -s UUID -o value /dev/nvme0n1p2

      - name: Verify Mounting
        run: |
          mount | grep /dev/nvme0n1p2
          mount | grep /dev/nvme0n1p1

      - name: Verify Hardware Configuration Generation
        run: |
          test -f /mnt/etc/nixos/hardware-configuration.nix
