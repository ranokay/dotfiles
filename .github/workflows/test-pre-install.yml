name: Test NixOS Pre-Install Script

on: [push, pull_request]

jobs:
  test-nixos:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        run: curl -L https://nixos.org/nix/install | sh

      - name: Source Nix profile
        run: . /home/runner/.nix-profile/etc/profile.d/nix.sh

      - name: Enter Nix shell
        run: nix-shell -p nixos-generators --run "echo 'Entered Nix shell'"

      - name: Debug pre-install script
        run: |
          chmod +x pre-install.sh
          set -x  # Enable script debugging
          ./pre-install.sh
        env:
          DISK: /dev/sda
          REPLY: y
