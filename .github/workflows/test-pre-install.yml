name: Test NixOS Pre-Install Script

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-nixos-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Nix environment
        uses: cachix/install-nix-action@v22
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Install required packages
        run: |
          nix-channel --update
          nix-env -iA nixpkgs.parted nixpkgs.util-linux nixpkgs.e2fsprogs nixpkgs.dosfstools

      - name: Create virtual disk
        run: |
          sudo truncate -s 4G /tmp/nixos-disk.img
          sudo losetup /dev/loop0 /tmp/nixos-disk.img

      - name: Run pre-install script
        run: |
          chmod +x pre-install.sh
          echo -e "/dev/loop0\ny\ny\ny" | sudo ./pre-install.sh

      - name: Verify partitions
        run: |
          sudo lsblk /dev/loop0
          sudo blkid /dev/loop0p1
          sudo blkid /dev/loop0p2

      - name: Check mounted filesystems
        run: |
          mount | grep /mnt

      - name: Verify hardware configuration
        run: |
          sudo test -f /mnt/etc/nixos/hardware-configuration.nix

      - name: Clean up
        if: always()
        run: |
          sudo umount /mnt/boot || true
          sudo umount /mnt || true
          sudo losetup -d /dev/loop0 || true
