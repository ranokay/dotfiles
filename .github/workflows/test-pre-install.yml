name: "Test Pre-install Script"

on:
  push:
    branches:
      - main
  workflow_dispatch: null

jobs:
  test-pre-install-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27

      - name: Set up test environment
        run: sudo apt-get update

      - name: Create test disk image
        run: |
          dd if=/dev/zero of=testdisk.img bs=1M count=1024
          sudo losetup -f testdisk.img
          LOOP_DEVICE=$(sudo losetup -j testdisk.img | cut -d':' -f1)
          echo "LOOP_DEVICE=$LOOP_DEVICE" >> $GITHUB_ENV

      - name: Modify pre-install script for testing
        run: |
          sed -i 's/read -p "Enter the disk to partition (e.g., \/dev\/nvme0n1): " DISK/DISK=$LOOP_DEVICE/' pre-install.sh
          sed -i 's/confirm "Are you sure you want to format $DISK? This will erase all data on the disk."/echo "Confirmed disk formatting for testing"/' pre-install.sh
          sed -i 's/confirm "This script will prepare the system for NixOS installation. Do you want to continue?"/echo "Confirmed NixOS installation preparation for testing"/' pre-install.sh

      - name: Run pre-install script
        run: |
          sudo bash pre-install.sh --disk ${{ env.LOOP_DEVICE }} --auto-confirm

      - name: Verify partitions and filesystems
        run: |
          sudo fdisk -l ${{ env.LOOP_DEVICE }}
          sudo blkid ${LOOP_DEVICE}p1
          sudo blkid ${LOOP_DEVICE}p2

      - name: Clean up
        run: |
          sudo umount /mnt/boot || true
          sudo umount /mnt || true
          sudo losetup -d ${{ env.LOOP_DEVICE }}
