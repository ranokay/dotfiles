name: Test Pre-Install NixOS Script

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual triggering of the workflow

jobs:
  test-script:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup environment
        run: |
          sudo apt-get update
          sudo apt-get install -y parted blkid mkfs.fat mkfs.ext4

      - name: Copy and run script
        run: |
          cp pre-install.sh .
          chmod +x pre-install.sh
          ./pre-install.sh

      - name: Check script execution
        run: |
          if [ $? -eq 0 ]; then
            echo "Script executed successfully"
          else
            echo "Script failed to execute"
            exit 1
          fi
