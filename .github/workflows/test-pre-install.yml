name: "Test Pre-Install NixOS Script"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: cachix/install-nix-action@v27

      - name: Setup Mock Disk
        run: |
          sudo fallocate -l 1G /tmp/mockdisk.img
          sudo losetup /dev/loop0 /tmp/mockdisk.img

      - name: Run Pre-Install Script
        run: |
          sudo bash pre-install.sh <<EOF
          y
          /dev/loop0
          y
          EOF

      - name: Cleanup
        run: |
          sudo losetup -d /dev/loop0
          sudo rm /tmp/mockdisk.img
