name: "Release Custom NixOS ISO"

on:
  push:
    tags:
      - v*
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        architecture:
          - x86_64-linux
          - aarch64-linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: cachix/install-nix-action@v27

      - name: Set up QEMU for ARM builds
        if: matrix.architecture == 'aarch64-linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu binfmt-support qemu-user-static
          sudo update-binfmts --enable qemu-aarch64
          echo "experimental-features = nix-command flakes" | sudo tee -a /etc/nix/nix.conf
          echo "extra-platforms = aarch64-linux" | sudo tee -a /etc/nix/nix.conf

      - name: Build ISO
        run: |
          nix_bin=$(which nix)
          sudo $nix_bin build .#nixosConfigurations.iso1-${{ matrix.architecture }}.config.system.build.isoImage

      - name: Rename ISO
        run: |
          if [ "${{ matrix.architecture }}" == "x86_64-linux" ]; then
            sudo mv result/iso/nixos-*.iso nixos-x86_64.iso
          else
            sudo mv result/iso/nixos-*.iso nixos-arm.iso
          fi

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: nixos-${{ matrix.architecture }}.iso
          path: nixos-${{ matrix.architecture }}.iso

  release:
    needs: build
    runs-on: ubuntu-latest
    if: needs.build.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Tag (if manual run)
        if: github.event_name == 'workflow_dispatch'
        run: |
          tag="v$(date +'%Y.%m.%d.%H.%M')"
          echo "TAG=$tag" >> $GITHUB_ENV
          git tag $tag
          git push origin $tag

      - name: Download ISOs
        uses: actions/download-artifact@v4
        with:
          path: ./iso

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: |
            ./iso/nixos-x86_64.iso
            ./iso/nixos-arm.iso
