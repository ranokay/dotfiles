name: "Release Custom NixOS ISO"

on:
  push:
    tags:
      - v*
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        architecture: [x86_64-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            extra-platforms = aarch64-linux

      - name: Set up QEMU for ARM builds
        if: matrix.architecture == 'aarch64-linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq qemu binfmt-support qemu-user-static

      - name: Build ISO
        run: |
          nix build .#nixosConfigurations.iso1-${{ matrix.architecture }}.config.system.build.isoImage

      - name: Rename ISO
        run: |
          sudo mv result/iso/nixos-*.iso nixos-${{ matrix.architecture }}.iso

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: nixos-${{ matrix.architecture }}.iso
          path: ./result

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Tag (if manual run)
        if: github.event_name == 'workflow_dispatch'
        run: |
          tag="v$(date +'%Y.%m.%d.%H.%M')"
          echo "TAG=$tag" >> $GITHUB_ENV
          git tag $tag
          git push origin $tag

      - name: Download ISOs
        uses: actions/download-artifact@v4
        with:
          path: ./result

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: |
            ./result/nixos-${{ matrix.architecture }}.iso
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
